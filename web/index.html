<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AgentOS Local AI</title>
  <style>
    :root{color-scheme:dark;--bg:#080b16;--panel:#11182b;--line:#283556;--text:#eef2ff;--muted:#94a3b8;--blue:#40c9ff;--purple:#7c6cff;--danger:#fb7185}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#17213e 0,var(--bg) 42%);color:var(--text);font:16px system-ui,sans-serif}.app{max-width:960px;margin:auto;padding:24px 18px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}h1{margin:0;color:var(--blue);font-size:clamp(1.5rem,4vw,2.2rem)}.subtitle{color:var(--muted);margin:.35rem 0}.status{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);border:1px solid var(--line);border-radius:99px}.dot{width:9px;height:9px;border-radius:50%;background:#f59e0b}.dot.ok{background:#22c55e}.dot.bad{background:var(--danger)}.toolbar{display:grid;grid-template-columns:1fr 160px auto auto;gap:10px;margin:20px 0}select,input,textarea,button{font:inherit}select,input,textarea{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:11px}button{border:0;border-radius:10px;padding:10px 15px;background:var(--purple);color:white;font-weight:700;cursor:pointer}button.secondary{background:#25304b}button.danger{background:#3a1b2a;color:#fda4af}button:disabled{opacity:.55;cursor:wait}#chat{min-height:52vh;max-height:62vh;overflow:auto;border:1px solid var(--line);border-radius:16px;padding:16px;background:rgba(8,11,22,.7)}.empty{text-align:center;color:var(--muted);padding:18vh 20px}.msg{padding:13px 15px;margin:10px 0;border-radius:12px;background:var(--panel);white-space:pre-wrap;line-height:1.55;overflow-wrap:anywhere}.user{border-left:4px solid var(--purple);margin-left:8%}.assistant{border-left:4px solid var(--blue);margin-right:8%}.label{display:block;font-size:.72rem;text-transform:uppercase;color:var(--muted);margin-bottom:5px}.composer{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:12px}textarea{resize:vertical;min-height:58px;max-height:180px}.hint{color:var(--muted);font-size:.8rem;margin:7px 2px}.error{color:#fda4af}@media(max-width:680px){.toolbar{grid-template-columns:1fr 1fr}.toolbar select{grid-column:1/-1}.composer{grid-template-columns:1fr}.composer button{height:46px}.user,.assistant{margin-left:0;margin-right:0}}
  </style>
</head>
<body><main class="app">
  <header class="top"><div><h1>AgentOS Local AI</h1><p class="subtitle">Conversa privada com modelos Ollama no seu computador.</p></div><div class="status"><span id="dot" class="dot"></span><span id="status">Verificando Ollama…</span></div></header>
  <section class="toolbar" aria-label="Configurações da conversa">
    <select id="model" aria-label="Modelo"><option>Carregando modelos…</option></select>
    <label><span class="label">Criatividade</span><input id="temperature" type="range" min="0" max="2" value="0.7" step="0.1"></label>
    <button id="export" class="secondary" type="button">Exportar</button>
    <button id="clear" class="danger" type="button">Limpar</button>
  </section>
  <section id="chat" aria-live="polite"><div class="empty">Escolha um modelo e envie sua primeira mensagem.<br>O histórico fica somente neste navegador.</div></section>
  <form id="form" class="composer"><textarea id="q" placeholder="Digite sua mensagem…" required autofocus></textarea><button id="send">Enviar</button></form>
  <p class="hint">Enter envia · Shift+Enter cria uma nova linha · conversas são salvas localmente.</p>
</main>
<script>
const key='agentos-local-ai-history-v1',history=JSON.parse(localStorage.getItem(key)||'[]');
const chat=document.querySelector('#chat'),q=document.querySelector('#q'),form=document.querySelector('#form'),send=document.querySelector('#send'),model=document.querySelector('#model'),statusEl=document.querySelector('#status'),dot=document.querySelector('#dot'),temperature=document.querySelector('#temperature');
function save(){localStorage.setItem(key,JSON.stringify(history))}
function render(){chat.textContent='';if(!history.length){const e=document.createElement('div');e.className='empty';e.textContent='Escolha um modelo e envie sua primeira mensagem. O histórico fica somente neste navegador.';chat.append(e);return}history.forEach(m=>show(m.role,m.content,false));chat.scrollTop=chat.scrollHeight}
function show(role,text,scroll=true){const box=document.createElement('div'),label=document.createElement('span'),body=document.createElement('div');box.className=`msg ${role}`;label.className='label';label.textContent=role==='user'?'Você':'Assistente';body.textContent=text;box.append(label,body);chat.append(box);if(scroll)chat.scrollTop=chat.scrollHeight}
async function setup(){try{const [healthRes,modelsRes]=await Promise.all([fetch('/api/health'),fetch('/api/models')]);const health=await healthRes.json(),models=await modelsRes.json();if(!health.ok)throw new Error(health.error||'Ollama indisponível');dot.className='dot ok';statusEl.textContent='Ollama conectado';const names=(models.models||[]).map(x=>x.name);model.textContent='';names.forEach(name=>model.add(new Option(name,name)));if(!names.length){model.add(new Option('Nenhum modelo instalado',''));send.disabled=true;statusEl.textContent='Instale um modelo no Ollama'}const preferred=localStorage.getItem('agentos-model')||health.default_model;if(names.includes(preferred))model.value=preferred}catch(error){dot.className='dot bad';statusEl.textContent='Ollama desconectado';statusEl.title=error.message;model.innerHTML='<option value="">Ollama indisponível</option>';send.disabled=true}}
form.addEventListener('submit',async event=>{event.preventDefault();const text=q.value.trim();if(!text||!model.value)return;q.value='';history.push({role:'user',content:text});save();render();send.disabled=true;send.textContent='Pensando…';try{const response=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history,model:model.value,temperature:Number(temperature.value)})});const data=await response.json();if(!response.ok)throw new Error(data.error||`Erro HTTP ${response.status}`);const answer=data.message?.content||'O modelo não retornou conteúdo.';history.push({role:'assistant',content:answer});save();show('assistant',answer)}catch(error){show('assistant',`Erro: ${error.message}`)}finally{send.disabled=false;send.textContent='Enviar';q.focus()}});
q.addEventListener('keydown',event=>{if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();form.requestSubmit()}});model.addEventListener('change',()=>localStorage.setItem('agentos-model',model.value));
document.querySelector('#clear').onclick=()=>{if(history.length&&confirm('Apagar toda a conversa deste navegador?')){history.splice(0);save();render()}};
document.querySelector('#export').onclick=()=>{if(!history.length)return;const blob=new Blob([JSON.stringify({exported_at:new Date().toISOString(),model:model.value,messages:history},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`agentos-conversa-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href)};
render();setup();
</script></body></html>
