<!doctype html><html lang="pt-BR"><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>AgentOS Local AI</title><style>body{margin:auto;max-width:850px;padding:30px;background:#080b16;color:#eef2ff;font:16px system-ui}h1{color:#40c9ff}#chat{min-height:50vh;border:1px solid #283556;border-radius:16px;padding:20px}.msg{padding:12px;margin:8px;border-radius:10px;background:#141b30}.user{border-left:3px solid #8b5cf6}.bot{border-left:3px solid #40c9ff}form{display:flex;gap:10px;margin-top:14px}input{flex:1;padding:14px;border-radius:10px;border:1px solid #344;background:#11182b;color:white}button{padding:0 20px;border:0;border-radius:10px;background:#6d5dfc;color:white}</style><h1>AgentOS Local AI</h1><p>Assistente privado usando Ollama no seu computador.</p><div id="chat"></div><form><input id="q" placeholder="Digite sua mensagem" autofocus><button>Enviar</button></form><script>const history=[],chat=document.querySelector('#chat'),q=document.querySelector('#q');document.querySelector('form').onsubmit=async e=>{e.preventDefault();if(!q.value)return;const text=q.value;q.value='';history.push({role:'user',content:text});show('user',text);try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history})}),j=await r.json(),a=j.message?.content||j.error;history.push({role:'assistant',content:a});show('bot',a)}catch(x){show('bot',x.message)}};function show(c,t){chat.insertAdjacentHTML('beforeend',`<div class="msg ${c}">${t.replace(/[&<>]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[x]))}</div>`)}</script></html>
